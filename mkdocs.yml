# ============================================================
# PORTFOLIO CONFIGURATION
# ============================================================

site_name: "Warish Hussain - Portfolio"
site_description: "Portfolio of Warish Hussain — ESG, Climate Risk, Sustainability, and Spatial Data Science"
site_author: "Warish Hussain"
site_url: "https://warish6798.github.io/warish6798.github.io/"

theme:
  name: material
  icon:
    logo: material/earth
  palette:
    - scheme: default
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.top
    - content.code.copy
  font:
    text: Roboto
    code: Roboto Mono

extra_css:
  - assets/css/extra.css

markdown_extensions:
  - md_in_html
  - attr_list
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

copyright: "Copyright &copy; Warish Hussain"

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/warish6798
    - icon: fontawesome/brands/linkedin
      link: https://www.linkedin.com/in/warish-hussain-4b1b41228
    - icon: material/link
      name: ResearchGate
      link: https://www.researchgate.net/profile/Warish-Hussain-2
    - icon: material/email
      link: mailto:warish6798@gmail.com

plugins:
  - search
  - meta
  - mkdocs-jupyter

use_directory_urls: true

extra_javascript:
  - assets/maps/plant-location-map.html

nav:
  - Home: index.md
  - Projects:
    - "All Projects": projects/index.md
    - "Industrial Plant Mapping": projects/plant-location-map.md
    - "Carbon Stock Mapping": projects/carbon-stock-mapping.md
  - Publications: publications.md
  - Experience: experience.md
  - Contact: contact.md